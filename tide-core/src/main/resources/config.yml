tide:
  cycle-duration-minutes: 120
  spring-tide-chance: 5
  blood-moon-chance: 8
  scheduled-spring-day: SUNDAY

economy:
  clam-sink-reinforce-base: 100
  clam-sink-reinforce-multiplier: 1.5
  pearl-protection-scroll-cost: 3
  inflation-alert-threshold: 1000000

death_penalty:
  clam-loss-percent: 10
  grave-duration-seconds: 600
  debuff-duration-seconds: 60

drop_rate_multiplier:
  high_tide: 2.0
  low_tide_wild: 0.3
  low_tide_instance: 1.5
  spring_tide: 3.0

web-server:
  enabled: true
  port: 8080

# Resource Pack configuration
resource-pack:
  enabled: true
  url: "https://example.com/tide-resource-pack.zip"
  hash: "1a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t"
  force: false
  prompt: "&bProject Tide 전용 리소스팩&7을 적용합니다."

# Sound & Particle Visual/Audio Effects Configuration
effects:
  tide_change_high:
    title: "&b🌊 밀물의 조류"
    subtitle: "&7성장 및 채집 효율이 증가합니다."
    title-fade-in-ticks: 10
    title-stay-ticks: 40
    title-fade-out-ticks: 10
    sounds:
      - name: "ui.toast.challenge_complete"
        volume: 1.0
        pitch: 1.2
      - name: "ambient.underwater.enter"
        volume: 0.8
        pitch: 1.0
    particles:
      - type: "WATER_SPLASH"
        count: 50
        spread-x: 1.0
        spread-y: 0.5
        spread-z: 1.0
        speed: 0.1
    action-bar: "&b밀물이 시작되었습니다!"

  tide_change_low:
    title: "&6💨 썰물의 메마름"
    subtitle: "&7야생 채집 효율이 감소하고 전용 구역이 활성화됩니다."
    title-fade-in-ticks: 10
    title-stay-ticks: 40
    title-fade-out-ticks: 10
    sounds:
      - name: "block.water.ambient"
