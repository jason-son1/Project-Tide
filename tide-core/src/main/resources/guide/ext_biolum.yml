id: ext_biolum
category: extension
order: 5
icon: GLOW_BERRIES
title: "생물발광 채집"
summary: "사리+야간 해안에 나타나는 발광 포자를 전용 도구로 채집합니다."
pages:
  - |-
    §a[생물발광 채집]§r

    §e사리§r 시기의 §8야간§r 해안
    지역에는 §a발광 포자§r가 생성
    됩니다.

    전용 채집 도구(조수 추출기)
    로만 채집할 수 있습니다.
  - |-
    채집에는 위험이 따릅니다.
    포자를 캐는 동안 일정 확률로
    몹의 습격을 받을 수 있으니
    주변을 경계하며 채집하세요.

    채집한 생물발광 에센스는
    고급 룬 합성 등에 사용됩니다.
