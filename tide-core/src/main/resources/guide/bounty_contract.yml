id: bounty_contract
category: bounty
order: 2
icon: PAPER
title: "현상금 대행 계약"
summary: "내 네메시스 처치를 다른 플레이어에게 선불금과 성공보수로 의뢰합니다."
pages:
  - |-
    §d[현상금 대행 계약]§r

    자신의 네메시스가 너무 강해
    감당이 안 된다면, 다른
    플레이어에게 처치를 의뢰할
    수 있습니다.

    §d/bountycontract post <선불금>
    <성공보수>§r 로 계약을 등록
    합니다.
  - |-
    §d/bountycontract list§r 로
    게시판을 열어 다른 사람의
    계약을 확인하고 수락할 수
    있습니다.

    용병이 처치에 성공하면 즉시
    저주가 해제되고 성공보수
    (진주)를 받습니다. 실패해도
    선불금(조개)은 이미 지급된
    상태입니다.
commands:
  - "/bountycontract post <선불금> <성공보수>"
  - "/bountycontract list"
