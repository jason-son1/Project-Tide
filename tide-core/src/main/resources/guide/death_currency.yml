id: death_currency
category: death
order: 2
icon: GOLD_INGOT
title: "조개 · 진주 · 평판"
summary: "조개는 기본 화폐, 진주는 희귀 화폐, 평판은 등급과 신뢰도를 나타냅니다."
pages:
  - |-
    §6[조개 · 진주 · 평판]§r

    §6조개(Clam)§r: 강화 비용, 상점
    구매 등 일상적인 소비에
    사용하는 기본 화폐.

    §d진주(Pearl)§r: 룬 리롤, 보호
    주문서 등 고급 소비에 쓰이는
    희귀 화폐.
  - |-
    §d[진주 획득 경로]§r

    1. §b낚시 QTE (Perfect)§r:
       물고기 입질 시 매우 빠르게
       낚아채면 (250ms 이내)
       §f1~3개§r의 진주를 획득합니다.
    2. §c보스 레이드§r:
       보스 몹 토벌 완료 시
       참가 보상으로 획득합니다.
  - |-
    §d[진주 획득 경로]§r

    3. §e정예 및 특수 몹§r:
       강력한 정예/특수 몹 처치 시
       확률적으로 획득합니다.
    4. §a현상금 및 용병 계약§r:
       현상금 보드에서 계약을
       수행하고 완료하여 획득합니다.
    5. §6상점 판매§r:
       고급 아이템을 상점에 판매하여
       진주로 환전합니다.
  - |-
    §e평판(Rep)§r: 현상금 완료,
    네메시스 처치 등으로 쌓이며
    평판 등급을 결정합니다.

    §e/clam§r, §e/pearl§r 명령어로
    현재 보유량을 확인할 수
    있습니다.
commands:
  - "/clam"
  - "/pearl"
