id: ext_overdrive
category: extension
order: 3
icon: TRIDENT
title: "조수 오버드라이브"
summary: "공명 장비로 게이지를 채운 뒤 Shift+우클릭으로 강력한 필살기를 방출합니다."
pages:
  - |-
    §d[조수 오버드라이브]§r

    공명 장비를 착용한 채 전투를
    하면 게이지가 쌓입니다.

    게이지가 가득 차면 §dShift +
    우클릭§r으로 오버드라이브를
    발동할 수 있습니다.
  - |-
    발동 효과는 현재 조수 상태에
    따라 달라집니다 (예: 밀물은
    범위 밀치기, 블러드문은
    강력한 단일 대상 폭발 등).

    게이지는 전투를 계속해야
    유지·축적되니 평소에 공명
    장비를 적극 활용하세요.
