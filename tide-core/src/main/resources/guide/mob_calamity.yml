id: mob_calamity
category: mob
order: 3
icon: NETHER_STAR
title: "네메시스 각성 (Calamity)"
summary: "5회 이상 살아남은 네메시스는 호위를 거느린 재해급 위협으로 진화합니다."
pages:
  - |-
    §5[네메시스 각성 - Calamity]§r

    네메시스가 플레이어를 5회
    이상 죽이는 데 성공하면
    §5재해(Calamity)§r로 진화합니다.

    스탯이 §53.0배§r 이상으로
    폭증하고, 접두사를 최대
    4개까지 중첩합니다.
  - |-
    각성한 네메시스는 §c힘 II§r
    포션 효과를 얻고, 주변에
    호위 몹을 거느립니다.

    더 이상 원래 표적만 쫓지
    않고 근처의 다른 플레이어도
    공격할 수 있으니 서버 전체가
    경계해야 합니다.
