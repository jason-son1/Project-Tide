    §5[시간의 룬 각성]§r

    §e사리§r 또는 §4블러드 사리§r 동안
    번개 룬의 발동 확률이 §52배§r로
    오르고, 번개가 주변으로
    연쇄(체인)됩니다.
  - |-
    §4블러드문§r 또는 §4블러드 사리§r
    동안에는 흡혈 룬이 확률 대신
    §c고정 흡혈§r로 전환되어 매
    타격마다 안정적으로 체력을
    회복합니다.

    "장비 강화 ▶ 룬 효과 종류"와
    함께 보면 이해가 쉽습니다.
