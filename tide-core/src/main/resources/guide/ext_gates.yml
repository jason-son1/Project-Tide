id: ext_gates
category: extension
order: 6
icon: IRON_DOOR
title: "조수 게이트"
summary: "특정 조수 상태일 때만 개방되는 구역 입구입니다."
pages:
  - |-
    §9[조수 게이트]§r

    일부 구역(예: 가라앉은 유적)
    은 평소에는 막혀 있고, 지정된
    조수 상태일 때만 §9게이트§r가
    열립니다.
  - |-
    게이트는 조수가 바뀌는 순간
    자동으로 개폐되므로, 원하는
    구역에 들어가려면 해당
    조수 상태가 되기를 기다려야
    합니다.

    조수 상태는 보스바와 §e/tide§r
    명령어로 확인할 수 있습니다.
commands:
  - "/tide"
