id: tide_spring
category: tide
order: 2
icon: HEART_OF_THE_SEA
title: "사리 (Spring Tide)"
summary: "가장 희귀한 조수 상태. 드롭률 3배와 강력한 몹이 함께 찾아옵니다."
pages:
  - |-
    §e[사리 - Spring Tide]§r

    매주 일요일 등 정해진 주기에
    낮은 확률(약 5%)로 발생하는
    특수 조수 상태입니다.

    드롭률이 §e3.0배§r로 폭증하지만,
    그만큼 강력한 정예 몹들도
    함께 등장합니다.
  - |-
    사리 상태에서는 다음 콘텐츠가
    함께 활성화됩니다.

    §7- 생물발광 채집(해안 포자)
    §7- 룬 각성(번개 확률 2배+체인)
    §7- 공명 세트 보너스 적용

    위험과 보상이 모두 최고치인
    시기이니 준비를 갖추고
    맞이하세요.
