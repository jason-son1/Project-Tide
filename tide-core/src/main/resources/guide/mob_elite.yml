id: mob_elite
category: mob
order: 1
icon: IRON_SWORD
title: "정예 몹 (Elite)"
summary: "접두사가 붙은 강화 몹. 조수 상태에 따라 자연 스폰율이 달라집니다."
pages:
  - |-
    §6[정예 몹]§r

    일반 몹 스폰 시 일정 확률로
    접두사(Affix)가 붙은 §6정예§r
    개체로 강화되어 등장합니다.

    접두사 종류: 염화, 신속, 폭심,
    분열, 강철, 재생, 가시, 보호막
  - |-
    정예 몹은 일반 몹의 §61.5~2.5배§r
    체력·공격력을 가지며, 처치 시
    더 좋은 전리품을 드롭합니다.

    블러드문 시기에는 정예 몹의
    스폰율이 크게 증가하니
    주의하세요.
