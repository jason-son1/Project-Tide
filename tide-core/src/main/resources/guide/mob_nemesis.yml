id: mob_nemesis
category: mob
order: 2
icon: WITHER_SKELETON_SKULL
title: "네메시스 복수자"
summary: "당신을 죽인 몹이 강해져서 다시 당신을 쫓아옵니다."
pages:
  - |-
    §4[네메시스 복수자]§r

    플레이어를 죽인 몹은 일정
    확률로 §4네메시스§r로 각성하여
    이름을 얻고, 원래 자신을
    죽인 플레이어를 추적합니다.

    각성 시 서버 전체에 경고
    타이틀이 표시됩니다.
  - |-
    네메시스를 처치하면 §a복수
    완료§r 보상(전리품 3배 +
    네메시스 토큰 + 평판 +50)을
    받습니다.

    다른 플레이어가 대신 처치
    해도 저주는 해제되지만,
    보상은 일부(평판 +20)로
    줄어듭니다.

    "현상금과 계약 ▶ 현상금
    대행 계약"에서 다른 사람의
    네메시스 처치를 의뢰할 수도
    있습니다.
