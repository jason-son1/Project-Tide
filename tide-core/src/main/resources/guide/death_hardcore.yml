id: death_hardcore
category: death
order: 3
icon: TOTEM_OF_UNDYING
title: "하드코어 모드"
summary: "더 큰 위험을 감수하고 더 큰 보상을 노리는 선택적 모드입니다."
pages:
  - |-
    §c[하드코어 모드]§r

    §c/hardcore§r 명령어로 하드코어
    모드를 켜고 끌 수 있습니다.

    하드코어 상태에서는 사망
    페널티가 더 무거워지지만,
    그만큼 보상과 평판 획득이
    유리해집니다.
  - |-
    메인 메뉴(Shift+F)의 내 정보
    슬롯에서 현재 하드코어
    상태를 항상 확인할 수
    있습니다.
commands:
  - "/hardcore"
