id: ext_currents
category: extension
order: 1
icon: WATER_BUCKET
title: "조류 박리 (Tidal Currents)"
summary: "조수가 바뀌기 전, 물속의 플레이어를 강한 해류가 밀어냅니다."
pages:
  - |-
    §b[조류 박리]§r

    조수가 전환되기 직전 약 20초
    동안, 물속에 있는 플레이어는
    해안 방향으로 밀려나는 §b해류§r
    의 영향을 받습니다.

    해류의 세기는 사인파 형태로
    점점 강해지다가 약해집니다.
  - |-
    §a닻(Anchor)§r 옵션이 붙은 부츠를
    착용하면 해류에 대한 저항력을
    얻어 밀려나는 정도를 줄일 수
    있습니다.

    조수 전환 시점에 깊은 물속에
    있다면 미리 대비하세요.
