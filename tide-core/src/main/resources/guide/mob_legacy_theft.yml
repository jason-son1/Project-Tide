id: mob_legacy_theft
category: mob
order: 4
icon: CHEST_MINECART
title: "유품 강탈 (Legacy Theft)"
summary: "네메시스에게 죽으면 가장 좋은 장비를 빼앗기지만, 처치 시 돌려받을 수 있습니다."
pages:
  - |-
    §8[유품 강탈]§r

    네메시스에게 죽으면, 드롭될
    아이템 중 §8가장 강화 등급이
    높은 장비§r 하나를 네메시스가
    직접 빼앗아 착용합니다.

    빼앗긴 장비는 무덤에 떨어
    지지 않으니 더욱 절실하게
    되찾아야 합니다.
  - |-
    그 네메시스를 §a누가 처치하든§r
    빼앗긴 장비는 원래 주인에게
    자동으로 반환됩니다.

    원래 주인이 접속 중이 아니면
    다음 접속 시 자동으로
    전달됩니다.
