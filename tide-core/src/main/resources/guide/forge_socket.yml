id: forge_socket
category: forge
order: 2
icon: EMERALD
title: "소켓과 룬"
summary: "장비에 최대 3개의 소켓을 뚫고 룬을 장착해 특수 효과를 부여합니다."
pages:
  - |-
    §b[소켓과 룬]§r

    장비는 최대 §b3개§r의 소켓을
    가질 수 있으며, 각 소켓에
    룬을 장착하면 전투 중 특수
    효과가 발동합니다.

    룬은 Lore가 아닌 PDC에
    안전하게 저장되어 거래·
    합성 시에도 데이터가
    유지됩니다.
  - |-
    §e리롤§r: 진주 5개로 룬의
    무작위 효과 범위를 재조정.

    §6융합§r: 동일 등급 룬 3개를
    모아 상위 등급 룬 1개로
    합성.

    대장간 GUI의 탭을 이용해
    장착/리롤/융합을 모두 한
    화면에서 처리할 수 있습니다.
commands:
  - "/forge"
