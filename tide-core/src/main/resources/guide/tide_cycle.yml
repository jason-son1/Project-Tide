id: tide_cycle
category: tide
order: 1
icon: PRISMARINE_SHARD
title: "조수의 흐름"
summary: "밀물과 썰물이 약 2시간 주기로 교차하며 서버 전체에 영향을 줍니다."
pages:
  - |-
    §1[조수의 흐름]§r

    The Tide 서버는 약 120분 주기로
    §b밀물(High Tide)§r과
    §9썰물(Low Tide)§r을 오갑니다.

    조수가 바뀌면 몹 스폰, 아이템
    드롭률, 환경 효과가 함께
    달라집니다.
  - |-
    §b밀물§r: 채집·드롭 효율 2.0배

    §9썰물§r: 야생 드롭 0.3배로
    감소하지만, 썰물 전용 구역
    (딥 마인 등)에서는 1.5배로
    오히려 유리해집니다.

    화면 상단 보스바에서 현재
    조수 상태를 항상 확인할 수
    있습니다.
commands:
  - "/tide"
