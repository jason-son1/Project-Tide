id: death_grave
category: death
order: 1
icon: CHEST
title: "비석과 무덤"
summary: "사망 시 아이템은 사라지지 않고 비석에 보관되어 10분간 회수할 수 있습니다."
pages:
  - |-
    §7[비석과 무덤]§r

    사망하면 인벤토리가 그 자리에
    §7비석(무덤)§r으로 변환되어
    아이템이 즉시 사라지지
    않습니다.

    비석은 약 §710분§r간 유지되며,
    우클릭으로 아이템을 회수할
    수 있습니다.
  - |-
    사망 시 보유 조개의 §710%§r를
    잃고, 60초간 디버프가
    적용됩니다.

    유품 강탈로 빼앗긴 장비는
    비석에 들어가지 않으니
    "몬스터와 네메시스" 카테고리
    를 함께 확인하세요.
