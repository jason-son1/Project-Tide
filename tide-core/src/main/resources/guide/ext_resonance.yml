id: ext_resonance
category: extension
order: 2
icon: NAUTILUS_SHELL
title: "공명 세트 (Tide Resonance)"
summary: "장비의 공명 속성이 현재 조수와 일치하면 공격/방어가 50% 강화됩니다."
pages:
  - |-
    §3[공명 세트]§r

    일부 무기·방어구에는 §3공명
    (Resonance)§r 속성이 부여되어
    있습니다.

    착용한 공명 속성이 현재
    조수 상태와 일치하면 공격력
    과 방어력이 §350%§r 증가하며
    물보라 파티클이 발생합니다.
  - |-
    예) "밀물" 공명 무기는 밀물
    상태일 때만 강화되고, 썰물로
    바뀌면 보너스가 사라집니다.

    아이템 로어에서 공명 속성을
    항상 확인할 수 있습니다.
