id: forge_reinforce
category: forge
order: 1
icon: ANVIL
title: "강화 (Reinforce)"
summary: "조개를 소모해 장비를 1~10성까지 강화하여 기어스코어를 올립니다."
pages:
  - |-
    §a[강화 - Reinforce]§r

    §a/forge§r 명령어로 통합 대장간을
    열고 장비를 강화할 수 있습니다.

    강화 1성마다 §a기어스코어(GS)
    +5§r가 상승합니다.
  - |-
    강화 등급이 높아질수록 성공률은
    낮아집니다.

    §71성: 100%  →  10성: 25%

    실패 시 등급이 하락할 수
    있으니, §d보호 주문서§r(진주 3개)
    로 하락을 방지할 수 있습니다.

    강화 비용은 등급이 오를수록
    1.5배씩 증가합니다.
commands:
  - "/forge"
