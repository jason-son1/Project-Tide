pages:
  - |-
    §c[블러드문]§r

    약 8% 확률로 발생하는 위협적인
    조수 상태입니다.

    하늘이 붉어지고 평소보다
    훨씬 강력한 정예 몹들이
    습격해옵니다.
  - |-
    블러드문 중에는 §c조수 금고
    (Tide Vault)§r가 활성화되어
    평소 열 수 없는 특수 상자를
    개방할 수 있습니다.

    또한 흡혈 룬이 §c고정 흡혈§r로
    전환되어 전투 생존력이
    크게 올라갑니다.

    밀물·사리와 동시에 겹치면
    §4블러드 사리§r라는 최악의
    위협이 발생할 수 있습니다.
