id: bounty_board
category: bounty
order: 1
icon: WRITABLE_BOOK
title: "현상금 보드"
summary: "일일/주간 처치 임무를 수행하고 평판과 보상을 획득합니다."
pages:
  - |-
    §e[현상금 보드]§r

    §e/bounty§r 명령어로 현상금
    보드를 열면, 지정된 접두사를
    가진 정예 몹을 처치하는
    일일/주간 임무를 받을 수
    있습니다.
  - |-
    임무를 완료하면 보상과 함께
    §e평판(Rep)§r 점수가 오르며,
    평판 등급이 높아지면 상점
    및 거래에서 더 좋은 대우를
    받습니다.
commands:
  - "/bounty"
