tidal_currents:
  transition-window-seconds: 20
  strength: 0.25
  shore-direction: { x: 1.0, z: 0.0 }

deepmine:
  # 인스턴스가 여러 개일 수 있습니다 (관리자 명령어 `/deepmine create`로 자동 추가 가능).
  # 새 인스턴스는 기존 인스턴스들과 겹치지 않게 자동으로 좌표를 계산해 이 목록 끝에 추가됩니다.
  instances:
    - id: "mine_1"
      world: world
      reset-interval-minutes: 30
      bounds:
        min: { x: -200, y: -64, z: -200 }
        max: { x: -100, y: 60, z: -100 }
      entrance: { x: -150, y: 61, z: -150 }
  discovery-chance: 0.002
  hazard-chance: 0.02
  toxic-gas-damage: 2.0
  toxic-gas-interval-seconds: 5
  tiers:
    1:
      weight: 60
      grid-size: 3
      layers: [-50, -20, 10]
      room-styles:
        empty: 0.1
        pillar: 0.3
        treasure: 0.2
        monster: 0.2
        ore_vault: 0.2
        trap: 0.0
        parkour: 0.0
        miniboss: 0.0
    2:
      weight: 30
      grid-size: 4
      layers: [-50, -25, 0, 25]
      room-styles:
        empty: 0.05
        pillar: 0.2
        treasure: 0.2
        monster: 0.2
        ore_vault: 0.15
        trap: 0.1
        parkour: 0.05
        miniboss: 0.05
    3:
      weight: 10
      grid-size: 5
      layers: [-50, -30, -10, 10, 30]
      room-styles:
        empty: 0.0
        pillar: 0.1
        treasure: 0.2
        monster: 0.2
        ore_vault: 0.1
        trap: 0.15
        parkour: 0.15
        miniboss: 0.1
  loot:
    custom-item-chance: 0.40
    vanilla-rich-chance: 0.40
    clam-min: 20
    clam-max: 80
    custom-items:
      reinforce_stone:
        weight: 30
        kind: "ITEM"
      protection_scroll:
        weight: 18
        kind: "ITEM"
      spawn_setter:
        weight: 12
        kind: "ITEM"
      scroll_of_return:
        weight: 12
        kind: "ITEM"
      deepmine_lantern:
        weight: 8
        kind: "ITEM"
      deepmine_gasmask:
        weight: 4
        kind: "ITEM"
      deepmine_pickaxe:
        weight: 5
        kind: "ITEM"
      abyssal_core:
        weight: 3
        kind: "ITEM"
      rune_lifesteal_1:
        weight: 2
        kind: "RUNE"
      rune_lightning_1:
        weight: 2
        kind: "RUNE"
      rune_slow_1:
        weight: 2
        kind: "RUNE"
      rune_berserk_1:
        weight: 2
        kind: "RUNE"
      rune_lifesteal_2:
        weight: 1
        kind: "RUNE"
      rune_lightning_2:
        weight: 1
        kind: "RUNE"

functional-items:
  spawn_setter:
    enabled: true
  scroll_of_return:
    enabled: true
