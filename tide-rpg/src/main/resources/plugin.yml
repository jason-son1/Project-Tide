name: TideRPG
version: ${project.version}
main: com.tide.rpg.TideRPGPlugin
api-version: '1.21'
depend: [TideCore]
author: TideTeam
description: The Tide v2 - PDC item stats, sockets/runes, combat listener, virtual shop.

commands:
  shop:
    description: 더 타이드 상점을 엽니다.
    usage: /shop
  forge:
    description: 통합 가상 대장간(강화/룬장착/룬리롤/룬융합)을 엽니다.
    usage: /forge
  deepmine:
    description: 딥 마인 인스턴스에 입장/퇴장, 위치 확인, 신규 인스턴스 자동 생성을 합니다. (tide.admin)
    usage: /deepmine [enter|leave|info] [id] 또는 /deepmine create
  codex:
    description: 아이템 도감을 엽니다.
    usage: /codex

