name: TideRPG
version: ${project.version}
main: com.tide.rpg.TideRPGPlugin
api-version: '1.21'
depend: [TideCore]
author: TideTeam
description: The Tide v2 - PDC item stats, sockets/runes, combat listener, virtual shop.

commands:
  shop:
    description: 더 타이드 상점을 엽니다.
    usage: /shop
  forge:
    description: 통합 가상 대장간(강화/룬장착/룬리롤/룬융합)을 엽니다.
    usage: /forge
  deepmine:
    description: 딥 마인 인스턴스에 입장/퇴장합니다.
    usage: /deepmine [enter|leave]
  sellall:
    description: 인벤토리의 잡템을 한 번에 조개로 환전합니다.
    usage: /sellall [confirm|cancel]
